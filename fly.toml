# Fly.io — бесплатный облачный запуск 24/7 (см. DEPLOY_FREE.md)
app = "deltadesk-bot"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "bot_data"
  destination = "/app/data"

[env]
  PORT = "8080"
  DATA_DIR = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[processes]
  app = "python bot.py"
